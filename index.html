<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Turbo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">

    <h1><span class="turbo">TURBO</span></h1>

    <!-- Tense Buttons -->
    <div id="tense-buttons" style="margin-bottom: 20px;">
      <button class="tense-button active" data-tense="Present">Present</button>
      <button class="tense-button" data-tense="Past">Past</button>
      <button class="tense-button" data-tense="Future">Future</button>
    </div>

    <!-- Level Selection Section -->
    <div id="level-list"></div>

    <!-- Game Section -->
    <div id="game" style="display: none;">
      <div id="timer">Time: 0s</div>

      <!-- Accessibility + SFX controls (does not change gameplay) -->
      <div id="a11y-bar" class="a11yBar" aria-label="Accessibility controls">
        <button id="read-all" class="a11yBtn" type="button" title="Read all questions">🔊 Read</button>
        <button id="stop-reading" class="a11yBtn" type="button" title="Stop reading">⏹ Stop</button>
        <span class="a11yToggle">
          <input id="sound-toggle" type="checkbox" checked />
          <label for="sound-toggle">Sounds</label>
        </span>
        <span class="a11yToggle">
          <input id="voice-toggle" type="checkbox"  />
          <label for="voice-toggle">Voice</label>
        </span>
        <span class="a11yToggle">
          <input id="arcade-toggle" type="checkbox" checked />
          <label for="arcade-toggle">Arcade FX</label>
        </span>
        <span class="a11yToggle">
          <input id="startvoice-toggle" type="checkbox"  />
          <label for="startvoice-toggle">Start Voice</label>
        </span>
      </div>
      <div id="questions"></div>
      <button id="submit" type="button" onclick="checkAnswers(event)">Check Answers</button>
      <div id="results"></div>
    </div>

  </div>

  <!-- script always at the end -->
  <script src="script.js"></script>
</body>
</html>
