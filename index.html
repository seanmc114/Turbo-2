<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Turbo Me (up)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<main class="wrap">
  <h1>Turbo Me (up)</h1>

  <!-- ✅ ALWAYS ENGLISH -->
  <p class="sub">
    Talk about You. Practice. Enjoy. You have a lot to say.
  </p>

  <div class="card" style="margin-bottom:16px;">
    <div style="font-weight:900;margin-bottom:10px;">
      Choose language
    </div>

    <div class="controls">
      <button id="langEs" type="button">Spanish</button>
      <button id="langFr" type="button">French</button>
      <button id="langDe" type="button">German</button>
    </div>

    <div class="tiny">
      Current: <span id="currentLangLabel">Spanish</span>
    </div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="card dash">
    <div>
      <strong>Total Stars:</strong>
      <span id="totalStars">0</span> ⭐
    </div>

    <!-- ✅ ENGLISH -->
    <div class="tiny">
      Tip: Dictation works everywhere because it records audio and transcribes to The Brother. (Br. Turbo)
    </div>

    <button id="reset" class="ghost" type="button">
      Reset Progress
    </button>
  </div>
</main>

<footer>© 2026 Synge St Games — imagination and perseverance</footer>

<script>
const totalStarsKey = "oral_totalStars";
const langKey = "oral_language";

/* -------------------------
   TILE TEXT ONLY (changes)
------------------------- */

const THEME_TITLES = {
  es: {
    yo:"Yo y mi personalidad",
    barrio:"Mi barrio y mi casa",
    instituto:"Mi instituto",
    familia:"Mi familia",
    amigos:"Mis amigos",
    tiempo:"Tiempo libre",
    vacaciones:"Vacaciones y viajes",
    salud:"Deporte y salud",
    tecnologia:"Tecnología y redes",
    comida:"Comida y vida diaria",
    futuro:"Planes y futuro"
  },
  fr: {
    yo:"Moi et ma personnalité",
    barrio:"Mon quartier et ma maison",
    instituto:"Mon école",
    familia:"Ma famille",
    amigos:"Mes amis",
    tiempo:"Temps libre",
    vacaciones:"Vacances et voyages",
    salud:"Sport et santé",
    tecnologia:"Technologie et réseaux",
    comida:"Nourriture et vie quotidienne",
    futuro:"Projets et avenir"
  },
  de: {
    yo:"Ich und meine Persönlichkeit",
    barrio:"Mein Wohnort und mein Zuhause",
    instituto:"Meine Schule",
    familia:"Meine Familie",
    amigos:"Meine Freunde",
    tiempo:"Freizeit",
    vacaciones:"Ferien und Reisen",
    salud:"Sport und Gesundheit",
    tecnologia:"Technologie und soziale Medien",
    comida:"Essen und Alltag",
    futuro:"Pläne und Zukunft"
  }
};

const THEMES = [
  { id:"yo", icon:"🙂" },
  { id:"barrio", icon:"🏠" },
  { id:"instituto", icon:"🎓" },
  { id:"familia", icon:"👨‍👩‍👧‍👦" },
  { id:"amigos", icon:"👫" },
  { id:"tiempo", icon:"⚽" },
  { id:"vacaciones", icon:"✈️" },
  { id:"salud", icon:"💪" },
  { id:"tecnologia", icon:"📱" },
  { id:"comida", icon:"🍽️" },
  { id:"futuro", icon:"🗺️" }
];

/* -------------------------
   STATE
------------------------- */

function getLang(){
  return localStorage.getItem(langKey) || "es";
}

function setLang(l){
  localStorage.setItem(langKey, l);
}

function langLabel(code){
  if(code==="fr") return "French";
  if(code==="de") return "German";
  return "Spanish";
}

function getTotalStars(){
  return Number(localStorage.getItem(totalStarsKey)||0);
}

function getBest(theme,tense){
  return Number(localStorage.getItem(`oral_best_${theme}_${tense}`)||0);
}

/* -------------------------
   RENDER
------------------------- */

function renderHeader(){
  document.getElementById("currentLangLabel").textContent = langLabel(getLang());
  document.getElementById("totalStars").textContent = getTotalStars();
}

function themeTitle(id){
  const lang = getLang();
  return THEME_TITLES[lang][id] || id;
}

function renderTiles(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  THEMES.forEach(t=>{
    const btn = document.createElement("button");
    btn.className="tile";

    btn.innerHTML = `
      <div class="tileTop">
        <div class="tileIcon">${t.icon}</div>
        <div>
          <div class="tileTitle">${themeTitle(t.id)}</div>
          <div class="tileMeta">
            Best ⭐:
            P ${"⭐".repeat(getBest(t.id,"present"))||"—"} ·
            Pa ${"⭐".repeat(getBest(t.id,"past"))||"—"} ·
            F ${"⭐".repeat(getBest(t.id,"future"))||"—"}
          </div>
        </div>
      </div>
      <div class="tileCTA">Choose tense →</div>
    `;

    btn.onclick=()=>{
      localStorage.setItem("oral_theme",t.id);
      window.location.href="tense.html";
    };

    grid.appendChild(btn);
  });
}

function renderAll(){
  renderHeader();
  renderTiles();
}

/* -------------------------
   EVENTS
------------------------- */

document.getElementById("langEs").onclick=()=>{
  setLang("es");
  renderAll();
};

document.getElementById("langFr").onclick=()=>{
  setLang("fr");
  renderAll();
};

document.getElementById("langDe").onclick=()=>{
  setLang("de");
  renderAll();
};

document.getElementById("reset").onclick=()=>{
  if(!confirm("Reset all stars and scores?")) return;

  localStorage.removeItem(totalStarsKey);

  Object.keys(localStorage).forEach(k=>{
    if(k.startsWith("oral_best_")) localStorage.removeItem(k);
  });

  renderAll();
};

/* -------------------------
   INIT
------------------------- */

renderAll();

</script>

</body>
</html>
